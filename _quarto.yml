project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!manuscript.qmd"
    - "!cleaning.qmd"
    - "!slides/05_26_mpg_berlin.qmd"

freeze: auto 

website:
  title: "The Silicon Sample Tournament"
  description: "A multi-team benchmark of AI approaches for predicting behavioral-experiment effects"
  favicon: ""
  page-footer:
    center: "The Silicon Sample Tournament · A multi-team benchmark of AI approaches for predicting behavioral-experiment effects · Jan Pfänder · 2026"
  navbar:
    background: dark
    foreground: light
    left:
      - text: "Home"
        href: index.qmd
      - text: "Preregistration"
        menu:
          - text: "Original preregistration"
            href: preregistration.qmd
          - text: "Amendment — multi-team benchmark approach"
            href: amendment_preregistration.qmd
      # Talks section hidden: the presentation reveals results that future
      # collaborator teams should not see. Kept local only (see .gitignore).
      # - text: "Talks"
      #   href: slides/talks.qmd
format:
  html:
    theme: [cosmo, theme.scss]
    highlight-style: nord
    toc: true
    toc-depth: 4
    toc-location: right
    code-tools: true
    smooth-scroll: true
    link-external-newwindow: true

bibliography: bibliography.bib

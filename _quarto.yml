project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!manuscript.qmd"
    - "!cleaning.qmd"
    - "!slides/05_26_mpg_berlin.qmd"

freeze: auto 

website:
  title: "The Silicon Sample Benchmark"
  description: "A multi-team benchmark of AI approaches for predicting behavioral-experiment effects"
  favicon: ""
  page-footer:
    center: "The Silicon Sample Benchmark · A multi-team benchmark of AI approaches for predicting behavioral-experiment effects · Jan Pfänder · 2026"
  navbar:
    background: dark
    foreground: light
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Preregistration"
        menu:
          - text: "Benchmark preregistration"
            href: preregistration_benchmark.qmd
          - text: "Original preregistration (v1, superseded)"
            href: preregistration.qmd
      - text: "Materials"
        menu:
          - text: "Submission template"
            href: materials.qmd
          - text: "Questionnaire"
            href: questionnaire.qmd
      # Talks section hidden: the presentation reveals results that future
      # collaborator teams should not see. Kept local only (see .gitignore).
      # - text: "Talks"
      #   href: slides/talks.qmd
    right:
      - text: "Team"
        href: team.qmd
      - text: "Contact"
        href: contact.qmd
format:
  html:
    theme: [cosmo, theme.scss]
    highlight-style: nord
    toc: true
    toc-depth: 4
    toc-location: right
    code-tools: true
    smooth-scroll: true
    link-external-newwindow: true

bibliography: bibliography.bib
